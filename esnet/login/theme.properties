parent=keycloak.v2
import=common/keycloak

# packets.css last so pkts-* rules take precedence over pf-* rules at equal specificity
styles=css/styles.css css/packets.css
stylesCommon=vendor/patternfly-v5/patternfly.min.css vendor/patternfly-v5/patternfly-addons.css

# inject pkts classes alongside pf classes so packets.css component rules apply
kcInputClass=pf-v5-c-form-control pkts-input
kcButtonDefaultClass=pf-v5-c-button pf-m-secondary pf-m-block btn-lg pkts-button pkts-secondary
kcButtonPrimaryClass=pf-v5-c-button pf-m-primary pf-m-block btn-lg pkts-button pkts-primary
kcButtonSecondaryClass=pf-v5-c-button pf-m-secondary pf-m-block btn-lg pkts-button pkts-secondary
kcCheckboxInputClass=pf-v5-c-check__input pkts-input-checkbox
